name: Release Node Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: nodejs
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$package_version" != "$tag_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match nodejs/package.json version $package_version"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build package
        run: bun run build

      - name: Pack release artifact
        id: pack
        run: |
          package_tgz="$(npm pack)"
          echo "package_tgz=$package_tgz" >> "$GITHUB_OUTPUT"

      # - name: Publish package to npm
      #   run: npm publish "${{ steps.pack.outputs.package_tgz }}" --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: nodejs/${{ steps.pack.outputs.package_tgz }}
          generate_release_notes: true
